<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS EXTREME - MASTER DHIRAJ</title>
    <style>
        :root { --main-color: #00d4ff; --bg-color: #020202; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-color); color: var(--main-color); font-family: 'Orbitron', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }

        /* Scanning HUD Effect */
        .hud-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: 10px solid rgba(0, 212, 255, 0.1); pointer-events: none; }
        
        /* The Big Arc Reactor */
        .reactor-container { position: relative; width: 350px; height: 350px; display: flex; align-items: center; justify-content: center; }
        
        .core { width: 100px; height: 100px; border-radius: 50%; background: radial-gradient(circle, #fff, var(--main-color)); box-shadow: 0 0 40px var(--main-color), 0 0 100px var(--main-color); z-index: 10; cursor: pointer; }
        
        .ring-box { position: absolute; border: 2px solid var(--main-color); border-radius: 50%; opacity: 0.6; }
        .r1 { width: 160px; height: 160px; border-top: 4px solid var(--main-color); animation: spin 2s linear infinite; }
        .r2 { width: 220px; height: 220px; border-left: 4px solid var(--main-color); animation: spin-rev 4s linear infinite; }
        .r3 { width: 280px; height: 280px; border-right: 4px solid var(--main-color); border-bottom: 4px solid var(--main-color); animation: spin 8s linear infinite; }
        .r4 { width: 340px; height: 340px; border: 1px dashed var(--main-color); animation: spin-rev 12s linear infinite; }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes spin-rev { 100% { transform: rotate(-360deg); } }
        
        /* Status Text */
        .info-panel { margin-top: 50px; text-align: center; width: 90%; }
        #cmd-display { font-size: 1.8rem; letter-spacing: 3px; font-weight: bold; text-shadow: 0 0 15px var(--main-color); }
        #log-display { color: #fff; margin-top: 10px; font-size: 0.9rem; opacity: 0.7; font-family: monospace; }
        
        .active-core { animation: core-pulse 0.5s infinite alternate; }
        @keyframes core-pulse { from { transform: scale(1); opacity: 1; } to { transform: scale(1.1); opacity: 0.8; } }

        .scanline { width: 100%; height: 2px; background: rgba(0, 212, 255, 0.2); position: absolute; top: 0; animation: scan 3s linear infinite; }
        @keyframes scan { 100% { top: 100%; } }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="hud-overlay"></div>
    <div class="scanline"></div>

    <div class="reactor-container">
        <div class="ring-box r1"></div>
        <div class="ring-box r2"></div>
        <div class="ring-box r3"></div>
        <div class="ring-box r4"></div>
        <div id="core-btn" class="core" onclick="initiateJarvis()"></div>
    </div>

    <div class="info-panel">
        <div id="cmd-display">SYSTEM IDLE</div>
        <div id="log-display">Awaiting Master Dhiraj's voice command...</div>
    </div>

    <script>
        const cmdDisplay = document.getElementById('cmd-display');
        const logDisplay = document.getElementById('log-display');
        const core = document.getElementById('core-btn');

        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.pitch = 0.85; // Deep AI Voice
            utterance.rate = 1.0;
            window.speechSynthesis.speak(utterance);
        }

        function initiateJarvis() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'en-US';

            recognition.onstart = () => {
                cmdDisplay.innerText = "LISTENING...";
                logDisplay.innerText = "Sensors active. Receiving audio data...";
                core.classList.add('active-core');
            };

            recognition.onresult = (event) => {
                const speech = event.results[0][0].transcript.toLowerCase();
                logDisplay.innerText = "Input: " + speech;
                handleLogic(speech);
            };

            recognition.onend = () => {
                core.classList.remove('active-core');
                if(cmdDisplay.innerText === "LISTENING...") cmdDisplay.innerText = "SYSTEM ONLINE";
            };

            recognition.start();
        }

        function handleLogic(msg) {
            cmdDisplay.innerText = "PROCESSING...";
            
            if (msg.includes('hello') || msg.includes('jarvis')) {
                speak("Hello Master Dhiraj. All systems are green. I am ready for your instructions.");
            }
            else if (msg.includes('time')) {
                speak("The current time is " + new Date().toLocaleTimeString());
            }
            else if (msg.includes('open youtube')) {
                speak("Accessing YouTube. Enjoy your videos, Master.");
                window.open("https://www.youtube.com", "_blank");
            }
            else if (msg.includes('open google')) {
                speak("Opening Google search engine.");
                window.open("https://www.google.com", "_blank");
            }
            else if (msg.includes('shutdown') || msg.includes('sleep')) {
                speak("Understood. System going to standby mode. Goodbye Master Dhiraj.");
                cmdDisplay.innerText = "SYSTEM SLEEP";
            }
            else {
                speak("Master, I am searching the global network for " + msg);
                window.open(`https://www.google.com/search?q=${msg}`, "_blank");
            }
        }

        // Initial Greeting
        window.onload = () => {
            setTimeout(() => {
                speak("System online. Welcome back, Master Dhiraj.");
            }, 1000);
        };
    </script>
</body>
</html>
