<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Jarvis AI - ChatGPT Powered</title>
    <style>
        body { background-color: #050505; color: #00d4ff; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #arc-reactor { width: 150px; height: 150px; border-radius: 50%; border: 4px solid #00d4ff; box-shadow: 0 0 20px #00d4ff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .active { animation: pulse 1.2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 20px #00d4ff; } 50% { transform: scale(1.1); box-shadow: 0 0 40px #00d4ff; } 100% { transform: scale(1); box-shadow: 0 0 20px #00d4ff; } }
        #status { margin-top: 20px; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div id="arc-reactor" onclick="startListening()">
        <div style="width: 60px; height: 60px; border-radius: 50%; border: 2px solid #00d4ff;"></div>
    </div>
    <div id="status">Tap to Speak</div>

    <script>
        const status = document.getElementById('status');
        const reactor = document.getElementById('arc-reactor');

        // --- APLE KEY YETHE TAKA ---
        const API_KEY = "YOUR_OPENAI_API_KEY_HERE"; 

        async function getChatGPTResponse(prompt) {
            status.innerText = "Thinking...";
            try {
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: "gpt-3.5-turbo",
                        messages: [{role: "user", content: prompt}]
                    })
                });
                const data = await response.json();
                return data.choices[0].message.content;
            } catch (error) {
                return "Sorry Dhiraj, I am having trouble connecting to my brain.";
            }
        }

        function speak(text) {
            const uttr = new SpeechSynthesisUtterance(text);
            window.speechSynthesis.speak(uttr);
        }

        function startListening() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.onstart = () => {
                status.innerText = "Listening...";
                reactor.classList.add('active');
            };
            recognition.onresult = async (event) => {
                const command = event.results[0][0].transcript;
                status.innerText = "You said: " + command;
                
                // ChatGPT kadun uttar ghene
                const aiResponse = await getChatGPTResponse(command);
                status.innerText = "Jarvis: " + aiResponse;
                speak(aiResponse);
                reactor.classList.remove('active');
            };
            recognition.start();
        }
    </script>
</body>
</html>
